<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Resolve theme before first paint to prevent flash of unstyled content -->
    <script>
      (function () {
        var pref = localStorage.getItem('sprintbrain-theme') || 'auto';
        var resolved =
          pref === 'auto'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : pref;
        document.documentElement.setAttribute('data-theme', resolved);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B4FD8" />
    <title>SprintBrain — Dashboard</title>
    <meta
      name="description"
      content="SprintBrain dashboard: snippets, analytics, prompts, and settings."
    />
    <link rel="icon" type="image/png" sizes="128x128" href="/icon128.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icon48.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon16.png" />
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
