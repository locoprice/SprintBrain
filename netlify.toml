[build]
  base    = "app"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Mobile app at /mobile/
[[redirects]]
  from   = "/mobile"
  to     = "/mobile/"
  status = 301

[[redirects]]
  from   = "/mobile/*"
  to     = "/mobile/:splat"
  status = 200

# SPA fallback for the dashboard (must be last)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
